name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: droid-dev-helper-linux
          - os: macos-latest
            artifact_name: droid-dev-helper-macos
          - os: windows-latest
            artifact_name: droid-dev-helper-windows

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pyqt5-dev-tools python3-pyqt5 libegl1-mesa-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5

      - name: Build Executable with PyInstaller (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: |
          pyinstaller --onefile --noconsole --name="droid-dev-helper" app.py

      - name: Build Executable with PyInstaller (macOS App Bundle)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onedir --noconsole --name="droid-dev-helper" app.py

      # --- Linux Specific Packaging (.deb, .AppImage, .tar.gz) ---
      - name: Package Linux Assets
        if: matrix.os == 'ubuntu-latest'
        run: |
          # 1. Create Tarball (.tar.gz)
          cd dist
          tar -czvf droid-dev-helper_linux_amd64.tar.gz droid-dev-helper
          cd ..

          # 2. Build Debian Package (.deb)
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/pixmaps

          # Get version from Git tag
          TAG_VERSION=${GITHUB_REF#refs/tags/v}

          # Write Control File
          echo "Package: droid-dev-helper" > deb/DEBIAN/control
          echo "Version: ${TAG_VERSION}" >> deb/DEBIAN/control
          echo "Section: utils" >> deb/DEBIAN/control
          echo "Priority: optional" >> deb/DEBIAN/control
          echo "Architecture: amd64" >> deb/DEBIAN/control
          echo "Maintainer: Hyeonseok0830 <hyeonseok0830@github.com>" >> deb/DEBIAN/control
          echo "Description: Android Developer Helper GUI using adb and scrcpy." >> deb/DEBIAN/control

          # Copy executable & icon
          cp dist/droid-dev-helper deb/usr/bin/droid-dev-helper
          if [ -f droid-dev-helper.png ]; then
            cp droid-dev-helper.png deb/usr/share/pixmaps/droid-dev-helper.png
          fi

          # Create Desktop Entry
          echo "[Desktop Entry]" > deb/usr/share/applications/droid-dev-helper.desktop
          echo "Name=Droid Dev Helper" >> deb/usr/share/applications/droid-dev-helper.desktop
          echo "Comment=Android Dev Helper GUI Tool" >> deb/usr/share/applications/droid-dev-helper.desktop
          echo "Exec=droid-dev-helper" >> deb/usr/share/applications/droid-dev-helper.desktop
          echo "Icon=droid-dev-helper" >> deb/usr/share/applications/droid-dev-helper.desktop
          echo "Terminal=false" >> deb/usr/share/applications/droid-dev-helper.desktop
          echo "Type=Application" >> deb/usr/share/applications/droid-dev-helper.desktop
          echo "Categories=Development;Utility;" >> deb/usr/share/applications/droid-dev-helper.desktop

          # Build deb
          dpkg-deb --build deb dist/droid-dev-helper_${TAG_VERSION}_amd64.deb

          # 3. Build AppImage (using linuxdeploy)
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          
          # Set up AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          
          cp dist/droid-dev-helper AppDir/usr/bin/
          cp deb/usr/share/applications/droid-dev-helper.desktop AppDir/usr/share/applications/
          
          # Run linuxdeploy to generate AppImage
          # Disable check inside container since Actions environment doesn't support FUSE out of the box
          export APPIMAGE_EXTRACT_AND_RUN=1
          
          if [ -f droid-dev-helper.png ]; then
            ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage --icon-file=droid-dev-helper.png
          else
            ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          fi
          
          mv Droid_Dev_Helper*.AppImage dist/Droid-Dev-Helper_${TAG_VERSION}_amd64.AppImage

      # --- macOS Specific Packaging (.dmg) ---
      - name: Package macOS Assets
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          
          cd dist
          # Compress app bundle as zip
          zip -r droid-dev-helper_mac_universal.zip droid-dev-helper.app
          
          # Build DMG
          create-dmg \
            --volname "Droid Dev Helper" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "droid-dev-helper.app" 175 120 \
            --app-drop-link 425 120 \
            "droid-dev-helper-${TAG_VERSION}-universal.dmg" \
            "droid-dev-helper.app"

      # --- Windows Specific Packaging (Setup.exe) ---
      - name: Package Windows Assets
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          
          # Generate Inno Setup file (.iss) dynamically
          echo "[Setup]" > setup.iss
          echo "AppName=Droid Dev Helper" >> setup.iss
          echo "AppVersion=${TAG_VERSION}" >> setup.iss
          echo "DefaultDirName={autopf}\Droid Dev Helper" >> setup.iss
          echo "DefaultGroupName=Droid Dev Helper" >> setup.iss
          echo "UninstallDisplayIcon={app}\droid-dev-helper.exe" >> setup.iss
          echo "OutputDir=dist" >> setup.iss
          echo "OutputBaseFilename=Droid_Dev_Helper_Setup_${TAG_VERSION}" >> setup.iss
          echo "Compression=lzma" >> setup.iss
          echo "SolidCompression=yes" >> setup.iss
          echo "WizardStyle=modern" >> setup.iss
          echo "" >> setup.iss
          echo "[Files]" >> setup.iss
          echo 'Source: "dist\droid-dev-helper.exe"; DestDir: "{app}"; Flags: ignoreversion' >> setup.iss
          echo "" >> setup.iss
          echo "[Icons]" >> setup.iss
          echo 'Name: "{group}\Droid Dev Helper"; Filename: "{app}\droid-dev-helper.exe"' >> setup.iss
          echo 'Name: "{autodesktop}\Droid Dev Helper"; Filename: "{app}\droid-dev-helper.exe"; Tasks: desktopicon' >> setup.iss
          echo "" >> setup.iss
          echo "[Tasks]" >> setup.iss
          echo 'Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked' >> setup.iss
          
          # Run Inno Setup Compiler (iscc is pre-installed on Windows runner)
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      # --- Upload Intermediate Artifacts for Release Job ---
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.deb
            dist/*.AppImage
            dist/*.tar.gz
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten Artifacts Structure
        run: |
          mkdir -p release_assets
          find artifacts -type f -exec cp {} release_assets/ \;
          ls -R release_assets/

      - name: Calculate SHA-256 Checksums
        run: |
          cd release_assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
